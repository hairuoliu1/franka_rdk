/**:
  controller_manager:
    ros__parameters:
      update_rate: 1000  # Hz
      thread_priority: 98

      joint_impedance_controller:
        type: franka_fr3_arm_controllers/JointImpedanceController

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

/**:
  joint_impedance_controller:
    ros__parameters:
      k_alpha: 0.99
      gello_joint_states_topic: gello/joint_states
      # Conservative contact tuning: reduce stiffness in small steps instead of
      # making the arm overly compliant or sluggish.
      k_gains:
        - 220.0
        - 220.0
        - 220.0
        - 220.0
        - 92.0
        - 58.0
        - 19.0
      d_gains:
        - 19.0
        - 19.0
        - 19.0
        - 9.5
        - 9.5
        - 9.0
        - 4.75
