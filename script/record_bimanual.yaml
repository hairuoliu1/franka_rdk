robot:
  type: bi_franka_fr3_robotiq_gripper
  left_arm_config:
    ros_domain_id: 0
    topic_namespace: left
    use_bridge: true
    use_ft_sensor: false
    cameras:
      left_camera:
        type: opencv
        index_or_path: /dev/video0
        width: 640
        height: 480
        fps: 30
        warmup_s: 3
        fourcc: MJPG
  right_arm_config:
    ros_domain_id: 0
    topic_namespace: right
    use_bridge: true
    use_ft_sensor: false
    cameras:
      middle_zed:
        type: zed2
        serial_number: null
        width: 672
        height: 376
        fps: 30
        warmup_s: 3
      right_camera:
        type: opencv
        index_or_path: /dev/video2
        width: 640
        height: 480
        fps: 30
        warmup_s: 3
        fourcc: MJPG
teleop:
  type: bi_gello_ros_leader
  left_arm_config:
    ros_domain_id: 0
    topic_namespace: left
    use_bridge: true
  right_arm_config:
    ros_domain_id: 0
    topic_namespace: right
    use_bridge: true
dataset:
  repo_id: local/bimanual_franka_recording
  num_episodes: 1
  single_task: bimanual franka recording
  fps: 30
  episode_time_s: 30
  reset_time_s: 0
  video: true
  streaming_encoding: true
  encoder_threads: 2
  vcodec: auto
  push_to_hub: false
display_data: false
play_sounds: false
